services:
  backend:
    build: ./backend
    network_mode: host
    pid: host
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    volumes:
      - ./data:/app/data
      - ${HOME}/.claude:/claude-data:ro
      - ${HOME}/.openclaw:/openclaw-data:ro
      - ${HOME}/.nvm:/host-nvm:ro
      - /home/nvme1/jhkim/00.Projects:/projects:ro
      - /etc:/host-etc:ro
    env_file: .env
    environment:
      - OPENCLAW_SESSIONS_PATH=/openclaw-data/agents/main/sessions/sessions.json
      - OPENCLAW_STATE_DIR=/openclaw-data
      - OPENCLAW_BIN=/host-nvm/versions/node/v22.22.0/bin/openclaw
      - OPENCLAW_NODE_BIN=/host-nvm/versions/node/v22.22.0/bin/node
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://192.192.192.169:8400
    ports:
      - "3400:3000"
    depends_on:
      - backend
    restart: unless-stopped
